version: '3.8'

services:
  gas-whisperer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_ETHEREUM_RPC_WS=${VITE_ETHEREUM_RPC_WS}
      - VITE_POLYGON_RPC_WS=${VITE_POLYGON_RPC_WS}
      - VITE_ARBITRUM_RPC_WS=${VITE_ARBITRUM_RPC_WS}
      - VITE_APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
